services:
  init:
    image: alpine:3.20
    restart: on-failure
    volumes:
      - "${APP_DATA_DIR}/config:/config"
      - "${APP_DATA_DIR}/data/stacks-node:/stacks-blockchain"
    environment:
      BURNCHAIN_PEER_HOST: "${APP_BITCOIN_NODE_IP}"
      BURNCHAIN_RPC_PORT: "${APP_BITCOIN_RPC_PORT:-8332}"
      BURNCHAIN_RPC_USER: "${APP_BITCOIN_RPC_USER}"
      BURNCHAIN_RPC_PASS: "${APP_BITCOIN_RPC_PASS}"
    command:
      - sh
      - -c
      - |
        set -e
        apk add --no-cache gettext
        if [ -d /stacks-blockchain/mainnet/chainstate ]; then
          echo '[Hiro Sync] Existing chainstate found. Skipping download.'
        else
          echo '[Hiro Sync] No existing chainstate found. Downloading Hiro snapshot...'
          apk add --no-cache wget zstd
          SNAPSHOT_URL='https://archive.hiro.so/mainnet/stacks-blockchain/mainnet-stacks-blockchain-latest.tar.zst'
          echo "[Hiro Sync] Downloading from $$SNAPSHOT_URL"
          wget -c --progress=dot:giga -O /stacks-blockchain/snapshot.tar.zst "$$SNAPSHOT_URL"
          echo '[Hiro Sync] Download complete. Extracting...'
          zstd -dc /stacks-blockchain/snapshot.tar.zst | tar -xf - -C /stacks-blockchain/ || { echo '[Hiro Sync] Extraction failed. Removing partial archive.'; rm -f /stacks-blockchain/snapshot.tar.zst; exit 1; }
          echo '[Hiro Sync] Extraction complete. Cleaning up archive...'
          rm /stacks-blockchain/snapshot.tar.zst
          echo '[Hiro Sync] Hiro Sync finished! Starting node...'
        fi
        mkdir -p /config
        printf '%s\n' \
          '[node]' \
          'rpc_bind = "0.0.0.0:20443"' \
          'p2p_bind = "0.0.0.0:20444"' \
          'working_dir = "/stacks-blockchain"' \
          'bootstrap_node = "02196f005965cebe6ddc3901b7b1cc1aa7a88f305bb8c5893456b8f9a605923893@seed.mainnet.hiro.so:20444"' \
          '' \
          '[burnchain]' \
          'chain = "bitcoin"' \
          'mode = "mainnet"' \
          'peer_host = "${BURNCHAIN_PEER_HOST}"' \
          'rpc_port = ${BURNCHAIN_RPC_PORT}' \
          'username = "${BURNCHAIN_RPC_USER}"' \
          'password = "${BURNCHAIN_RPC_PASS}"' \
          'rpc_ssl = false' \
          'peer_port = 8333' \
          'timeout = 300' | envsubst > /config/Config.toml
        echo 'Config rendered successfully.'
    networks:
      default:
        ipv4_address: $APP_EXPOLABS_STACKS_NODE_INIT_IP

  app:
    image: ghcr.io/stacks-network/stacks-core:3.4.0.0.0
    restart: unless-stopped
    stop_grace_period: 1m
    depends_on:
      init:
        condition: service_completed_successfully
    volumes:
      - "${APP_DATA_DIR}/data/stacks-node:/stacks-blockchain"
      - "${APP_DATA_DIR}/config:/src/stacks-node/config:ro"
    ports:
      # 21443/21444 are used instead of the default 20443/20444 to avoid
      # conflicts with any existing community Stacks app on the same device.
      - "21443:20443"
      - "21444:20444"
    environment:
      RUST_BACKTRACE: "1"
    networks:
      default:
        ipv4_address: $APP_EXPOLABS_STACKS_NODE_IP
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "curl -sf --max-time 5 http://127.0.0.1:20443/v2/info || exit 1"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    command: stacks-node start --config /src/stacks-node/config/Config.toml

networks:
  default:
    name: umbrel_main_network
    external: true
