services:
  init:
    image: alpine:3.20
    restart: "no"
    volumes:
      - "${APP_DATA_DIR}/config:/config"
      - "${APP_DATA_DIR}/data/stacks-node:/stacks-blockchain"
    environment:
      BURNCHAIN_PEER_HOST: "${APP_BITCOIN_NODE_IP}"
      BURNCHAIN_RPC_PORT: "${APP_BITCOIN_RPC_PORT:-8332}"
      BURNCHAIN_RPC_USER: "${APP_BITCOIN_RPC_USER}"
      BURNCHAIN_RPC_PASS: "${APP_BITCOIN_RPC_PASS}"
    command:
      - sh
      - -c
      - |
        set -e
        set -o pipefail

        MARKER="/stacks-blockchain/.extraction_complete"
        CHAINSTATE_DB="/stacks-blockchain/mainnet/chainstate/vm/index.sqlite"
        SNAPSHOT_URL="https://archive.hiro.so/mainnet/stacks-blockchain/mainnet-stacks-blockchain-latest.tar.zst"

        # Check if we have a complete chainstate (marker + actual DB file)
        if [ -f "$$MARKER" ] && [ -f "$$CHAINSTATE_DB" ]; then
          echo '[Hiro Sync] Existing chainstate found. Skipping download.'
        elif [ -f "$$CHAINSTATE_DB" ]; then
          # DB exists but marker is missing — treat as complete and re-create marker
          echo '[Hiro Sync] Chainstate found without completion marker. Re-creating marker.'
          touch "$$MARKER"
        else
          # No valid chainstate — clean up any partial extraction and re-download
          if [ -d /stacks-blockchain/mainnet ]; then
            echo '[Hiro Sync] Incomplete chainstate detected. Cleaning up...'
            rm -rf /stacks-blockchain/mainnet
          fi
          rm -f "$$MARKER"

          echo '[Hiro Sync] Downloading and extracting Hiro snapshot (streaming)...'
          apk add --no-cache wget zstd
          echo "[Hiro Sync] Source: $$SNAPSHOT_URL"

          # Stream directly: download | decompress | extract
          # No archive file is saved to disk — this halves the disk space requirement
          # set -o pipefail ensures any failure in the pipeline is caught
          wget -qO- "$$SNAPSHOT_URL" | zstd -dc | tar -xf - -C /stacks-blockchain/

          if [ -f "$$CHAINSTATE_DB" ]; then
            touch "$$MARKER"
            echo '[Hiro Sync] Extraction complete!'
          else
            echo '[Hiro Sync] ERROR: Extraction finished but chainstate DB not found. Cleaning up.'
            rm -rf /stacks-blockchain/mainnet
            exit 1
          fi
        fi

        # Generate Config.toml — validate required variables first
        # BURNCHAIN_RPC_PORT is optional and defaults to 8332 if unset
        if [ -z "$$BURNCHAIN_PEER_HOST" ] || [ -z "$$BURNCHAIN_RPC_USER" ] || [ -z "$$BURNCHAIN_RPC_PASS" ]; then
          echo '[Config] ERROR: Bitcoin connection variables are not set.'
          echo '[Config] BURNCHAIN_PEER_HOST, BURNCHAIN_RPC_USER, and BURNCHAIN_RPC_PASS are required.'
          exit 1
        fi

        mkdir -p /config
        cat > /config/Config.toml <<EOF
[node]
rpc_bind = "0.0.0.0:20443"
p2p_bind = "0.0.0.0:20444"
working_dir = "/stacks-blockchain"
bootstrap_node = "02196f005965cebe6ddc3901b7b1cc1aa7a88f305bb8c5893456b8f9a605923893@seed.mainnet.hiro.so:20444"

[burnchain]
chain = "bitcoin"
mode = "mainnet"
peer_host = "$$BURNCHAIN_PEER_HOST"
rpc_port = $${BURNCHAIN_RPC_PORT:-8332}
username = "$$BURNCHAIN_RPC_USER"
password = "$$BURNCHAIN_RPC_PASS"
rpc_ssl = false
peer_port = 8333
timeout = 300
EOF

        echo '[Config] Config.toml generated successfully.'
        echo "[Config] Bitcoin RPC: $$BURNCHAIN_PEER_HOST:$${BURNCHAIN_RPC_PORT:-8332}"
    networks:
      default:
        ipv4_address: $APP_EXPOLABS_STACKS_NODE_INIT_IP

  app:
    image: ghcr.io/stacks-network/stacks-core:3.4.0.0.0
    restart: unless-stopped
    stop_grace_period: 1m
    depends_on:
      init:
        condition: service_completed_successfully
    volumes:
      - "${APP_DATA_DIR}/data/stacks-node:/stacks-blockchain"
      - "${APP_DATA_DIR}/config:/src/stacks-node/config:ro"
    ports:
      # 21443/21444 are used instead of the default 20443/20444 to avoid
      # conflicts with any existing community Stacks app on the same device.
      - "21443:20443"
      - "21444:20444"
    environment:
      RUST_BACKTRACE: "1"
    networks:
      default:
        ipv4_address: $APP_EXPOLABS_STACKS_NODE_IP
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "curl -sf --max-time 5 http://127.0.0.1:20443/v2/info || exit 1"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    command: stacks-node start --config /src/stacks-node/config/Config.toml

networks:
  default:
    name: umbrel_main_network
    external: true
