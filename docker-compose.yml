services:
  init:
    image: alpine:3.20
    restart: "no"
    volumes:
      - "${APP_DATA_DIR}/config:/config"
      - "./config/Config.toml.template:/template/Config.toml.template:ro"
      - "${APP_DATA_DIR}/data/stacks-node:/stacks-blockchain"
    environment:
      BURNCHAIN_PEER_HOST: "${APP_BITCOIN_NODE_IP}"
      BURNCHAIN_RPC_PORT: "${APP_BITCOIN_RPC_PORT:-8332}"
      BURNCHAIN_RPC_USER: "${APP_BITCOIN_RPC_USER}"
      BURNCHAIN_RPC_PASS: "${APP_BITCOIN_RPC_PASS}"
    command: >
      sh -c "
        apk add --no-cache gettext &&
        if [ -d /stacks-blockchain/mainnet/chainstate ]; then
          echo '[Quick Sync] Existing chainstate found. Skipping download.';
        else
          echo '[Quick Sync] No existing chainstate found. Downloading Hiro snapshot...';
          apk add --no-cache wget;
          SNAPSHOT_URL='https://archive.hiro.so/mainnet/stacks-blockchain/mainnet-stacks-blockchain-latest.tar.gz';
          echo \"[Quick Sync] Downloading from \${SNAPSHOT_URL}\";
          wget -c --progress=dot:giga -O /stacks-blockchain/snapshot.tar.gz \"\${SNAPSHOT_URL}\";
          echo '[Quick Sync] Download complete. Extracting...';
          tar -xzf /stacks-blockchain/snapshot.tar.gz -C /stacks-blockchain/ || { echo '[Quick Sync] Extraction failed. Removing partial archive.'; rm -f /stacks-blockchain/snapshot.tar.gz; exit 1; };
          echo '[Quick Sync] Extraction complete. Cleaning up archive...';
          rm /stacks-blockchain/snapshot.tar.gz;
          echo '[Quick Sync] Quick Sync finished! Starting node...';
        fi &&
        mkdir -p /config &&
        envsubst < /template/Config.toml.template > /config/Config.toml &&
        echo 'Config rendered successfully.'
      "
    networks:
      default:
        ipv4_address: $APP_STACKS_NODE_INIT_IP

  app:
    image: ghcr.io/stacks-network/stacks-core:3.3.0.0.5
    restart: unless-stopped
    stop_grace_period: 1m
    depends_on:
      init:
        condition: service_completed_successfully
    volumes:
      - "${APP_DATA_DIR}/data/stacks-node:/stacks-blockchain"
      - "${APP_DATA_DIR}/config/Config.toml:/src/stacks-node/Config.toml:ro"
    ports:
      # 21443/21444 are used instead of the default 20443/20444 to avoid
      # conflicts with any existing community Stacks app on the same device.
      - "21443:20443"
      - "21444:20444"
    environment:
      RUST_BACKTRACE: "1"
    networks:
      default:
        ipv4_address: $APP_STACKS_NODE_IP
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "curl -sf --max-time 5 http://127.0.0.1:20443/v2/info || exit 1"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    command: stacks-node start --config /src/stacks-node/Config.toml

networks:
  default:
    name: umbrel_main_network
    external: true
